# Configuración para Fly.io - Trading Bot Monitor
app = "trading-bot-monitor-v2"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "10000"
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port = 10000
  force_https = false
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[mounts]
  source = "bot_data"
  destination = "/app/data"
